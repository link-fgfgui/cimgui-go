name: "Test source code"

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  CheckAutoGeneratedCode:
    name: 'Check if aut-generated code is up-to-date'
    runs-on: ubuntu-latest
    steps:
      - name: install luajit
        run: |
          sudo apt-get install -y luajit
      - name: Checkout out source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: 'recursive'
      - name: Re-generate code with Make
        run: |
          make generate
      - name: Check if code was up-to-date
        run: |
          echo -e "If you see this failing, it means that your have made changes in generator's code
          and the wrapper needs to be re-generated OR you've edited some of the generated
          files directly. To fix it, run \`make cimgui\` and/or \`make cimplot\`"
          git diff --exit-code

  RunGoTests:
    name: 'Run go unittests (${{ matrix.os }})'
    needs: CheckAutoGeneratedCode
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Set up LibGL, Mesa & X11 libraries
        if: startsWith(matrix.os,'ubuntu')
        run: |
          sudo apt-get --allow-releaseinfo-change update
          sudo apt-get install -y libgtk-3-dev libasound2-dev libxxf86vm-dev libdrm-dev libgbm-dev libegl1-mesa-dev libgles2-mesa-dev pkg-config
      - name: Set up Go environment
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'
      - name: Checkout out source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: 'recursive'
      - name: Set up Zig
        if: startsWith(matrix.os,'windows')
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Build cgo Zig wrapper
        if: startsWith(matrix.os,'windows')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .tmp
          go build -o .\.tmp\zigcgo.exe .\cmd\zigcgo
      - name: Run Go test
        if: "!startsWith(matrix.os,'windows')"
        run: go test -race -v ./...
      - name: Run Go test with Zig
        if: startsWith(matrix.os,'windows')
        shell: pwsh
        run: |
          $env:CGO_ENABLED = "1"
          $env:CC = "$PWD\.tmp\zigcgo.exe cc"
          $env:CXX = "$PWD\.tmp\zigcgo.exe c++"
          $env:ZIG_CGO_TARGET = "x86_64-windows-gnu"
          go test -v ./...
